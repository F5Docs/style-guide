name: Sync style guide submodule

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-submodule:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'sync-downstream')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout nginx/documentation
        uses: actions/checkout@v4
        with:
          repository: nginx/documentation
          token: ${{ secrets.NGINX_DOCS_BOT_PAT }}
          submodules: true

      - name: Update style guide submodule
        run: git submodule update --remote .style-guide

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet .style-guide && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      # TODO: Add sync job for BNK GitLab repo (gitswarm.f5net.com/techcomm/spk/spk-titan)
      # when ready, this job will use the GitLab API to open an MR instead of the gh CLI.
      # Required before adding:
      #   - GITSWARM_PAT secret (GitLab personal access token for the bot)
      #   - Confirm submodule path in BNK repo (likely .style-guide/)
      #   - Confirm default branch name in BNK repo
      #   - Confirm GitSwarm is reachable from GitHub Actions runners

      - name: Create branch and open PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.NGINX_DOCS_BOT_PAT }}
        run: |
          BRANCH="chore/sync-style-guide-$(date +%Y%m%d%H%M%S)"
          git config user.name "nginxdocsbot"
          git config user.email "nginxdocsbot@f5.com"
          git checkout -b "$BRANCH"
          git add .style-guide
          git commit -m "chore: Update F5 style guide submodule"
          git push origin "$BRANCH"
          gh pr create \
            --repo nginx/documentation \
            --title "chore: Update F5 style guide submodule" \
            --body "## F5 style guide update

This PR was opened automatically by the style guide sync workflow.

**Triggered by:** ${{ github.event.pull_request.html_url || 'Manual workflow run' }}

**What changed:** Review the commits in the style guide PR linked above for a summary of what changed.

## Before merging

- Review the diff in \`.style-guide/\` to confirm the changes look correct
- Check that any updated guidelines are reflected in \`copilot-instructions.md\` if needed
- Verify no unintended files were included in the sync" \
            --base main \
            --head "$BRANCH"